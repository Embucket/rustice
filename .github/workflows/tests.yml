# This is the main CI workflow that runs the test suite on all pushes to main and all pull requests.
permissions:
  contents: read
on:
  push:
    branches: [main]
    paths:
      - crates/**
      - Cargo.toml
      - Cargo.lock
      - Dockerfile
  pull_request:
    paths:
      - crates/**
      - Cargo.toml
      - Cargo.lock
      - Dockerfile
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
name: unit-tests
jobs:
  required:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    name: ubuntu / ${{ matrix.toolchain }}
    env:
      CARGO_TERM_COLOR: always
      COLUMNS: "80"
      RUSTFLAGS: "-C linker=clang -C link-arg=-fuse-ld=lld"
    strategy:
      matrix:
        # run on stable and beta to ensure that tests won't break on the next version of the rust
        # toolchain
        toolchain: [stable]
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - name: Install ${{ matrix.toolchain }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: cargo test workspace
        timeout-minutes: 35
        run: |
          cargo test --profile=ci --workspace --all-targets \
            --exclude api-snowflake-rest \
            --exclude embucket-sqllogictest
      - name: cargo test api-snowflake-rest
        timeout-minutes: 45
        run: |
          cargo test --profile=ci -p api-snowflake-rest --all-targets -- --test-threads=1

  sqllogictest:
    runs-on: ubuntu-latest
    name: sqllogictest (non-gating)
    continue-on-error: true
    env:
      CARGO_TERM_COLOR: always
      RUSTFLAGS: "-C linker=clang -C link-arg=-fuse-ld=lld"
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: run sqllogictest harness
        timeout-minutes: 30
        run: |
          cargo test -p embucket-sqllogictest --profile=ci --test sqllogictests -- \
            --test-threads $(nproc)
