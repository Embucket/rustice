name: image-security-scan

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - SECURITY.md
      - Dockerfile
      - Cargo.toml
      - Cargo.lock
      - crates/**
      - deploy/native-app/**
      - .github/workflows/image-security.yml
  pull_request:
    paths:
      - SECURITY.md
      - Dockerfile
      - Cargo.toml
      - Cargo.lock
      - crates/**
      - deploy/native-app/**
      - .github/workflows/image-security.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  IMAGE_TAG: rustice-security-scan:${{ github.sha }}

jobs:
  image-security:
    name: final image CVE and malware scan
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build final runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          tags: ${{ env.IMAGE_TAG }}
          push: false
          load: true

      - name: Prepare scan report directory
        run: mkdir -p scan-reports

      - name: Run Grype CVE scan
        uses: anchore/scan-action@v7
        with:
          image: ${{ env.IMAGE_TAG }}
          fail-build: false
          output-format: json
          output-file: scan-reports/grype-rustice-image.json

      - name: Enforce fixable HIGH/CRITICAL CVE gate
        run: |
          python3 - <<'PY'
          import json
          import sys

          with open('scan-reports/grype-rustice-image.json', encoding='utf-8') as f:
              report = json.load(f)

          blocking = []
          for match in report.get('matches', []):
              vulnerability = match.get('vulnerability', {})
              severity = vulnerability.get('severity')
              fix_versions = (vulnerability.get('fix') or {}).get('versions') or []
              if severity in {'High', 'Critical'} and fix_versions:
                  artifact = match.get('artifact', {})
                  blocking.append({
                      'id': vulnerability.get('id'),
                      'severity': severity,
                      'package': artifact.get('name'),
                      'installed': artifact.get('version'),
                      'fixed_in': ', '.join(fix_versions),
                  })

          if blocking:
              print('Fixable HIGH/CRITICAL vulnerabilities found in final image:')
              for item in blocking:
                  print(
                      f"- {item['id']} {item['severity']} "
                      f"{item['package']} {item['installed']} fixed in {item['fixed_in']}"
                  )
              sys.exit(1)

          print('No fixable HIGH/CRITICAL vulnerabilities found in final image.')
          PY

      - name: Save final image for malware scan
        run: docker save "${IMAGE_TAG}" -o scan-reports/rustice-image.tar

      - name: Install ClamAV
        run: |
          sudo apt-get update
          sudo apt-get install -y clamav
          sudo systemctl stop clamav-freshclam || true
          sudo freshclam --stdout

      - name: Run ClamAV malware scan
        run: |
          clamscan \
            --infected \
            --leave-temps \
            --log=scan-reports/clamav-rustice-image.log \
            scan-reports/rustice-image.tar

      - name: Upload image security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rustice-image-security-reports
          path: |
            scan-reports/grype-rustice-image.json
            scan-reports/clamav-rustice-image.log
          if-no-files-found: warn
