name: Build and release

on:
  # Run nightly at 2 AM UTC
  schedule:
    - cron: '0 2 * * *'
  push:
    tags:
      - "v*.*.*"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Run when a new release is created on GitHub
  release:
    types: [created]

env:
  REGISTRY_IMAGE: embucket/embucket

jobs:
  
  # This job builds and pushes a multi-arch Docker image to GitHub Container Registry.
  build-docker:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            platform_pair: linux-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            platform_pair: linux-arm64
    name: Build and Push Docker Image
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Prepare
        run: |
          echo "PLATFORM_PAIR=${{ matrix.platform_pair }}" >> $GITHUB_ENV

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}

      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v5
        with:
          name: digests-${{ matrix.platform_pair }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - build-docker
    permissions:
      contents: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v6
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ steps.meta.outputs.version }}

      - name: Append Docker pull instructions to release notes
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
          REGISTRY_IMAGE: ${{ env.REGISTRY_IMAGE }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          body=$(gh release view "$TAG" --json body --jq '.body')
          if printf '%s' "$body" | grep -q '^## Docker'; then
            echo "Docker section already present; skipping."
            exit 0
          fi
          {
            printf '%s\n\n' "$body"
            printf '## Docker\n\n'
            printf '```bash\n'
            printf 'docker pull %s:%s\n' "$REGISTRY_IMAGE" "$version"
            printf 'docker pull %s:latest\n' "$REGISTRY_IMAGE"
            printf '```\n'
          } > "$RUNNER_TEMP/release_body.md"
          gh release edit "$TAG" --notes-file "$RUNNER_TEMP/release_body.md"
